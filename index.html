<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora PGD 3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-container">
                <svg height="60" viewBox="0 0 130 45" xmlns="http://www.w3.org/2000/svg">
                    <style> .ibge-text { font-family: 'Roboto', sans-serif; font-weight: 900; font-style: italic; fill: #0f4098; font-size: 38px; } </style>
                    <text x="0" y="35" class="ibge-text">IBGE</text>
                </svg>
            </div>
            <h1>Calculadora PGD 3.0</h1>
        </div>

        <div class="row">
            <div class="col">
                <label>Mês</label>
                <select id="mes">
                    <option value="0">Janeiro</option>
                    <option value="1">Fevereiro</option>
                    <option value="2">Março</option>
                    <option value="3">Abril</option>
                    <option value="4">Maio</option>
                    <option value="5">Junho</option>
                    <option value="6">Julho</option>
                    <option value="7">Agosto</option>
                    <option value="8">Setembro</option>
                    <option value="9">Outubro</option>
                    <option value="10">Novembro</option>
                    <option value="11" selected>Dezembro</option> </select>
            </div>
            <div class="col">
                <label>Ano</label>
                <select id="ano">
                    <option value="2025" selected>2025</option> <option value="2026">2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>
        </div>

        <div class="forecast-card">
            <h3>📅 Feriados e Pontos Facultativos Previstos</h3>
            <ul id="listaFeriados">
                </ul>
            <div class="alert-yellow">
                <span>⚠️</span>
                <span>Importante: Esta lista exibe apenas previsões nacionais. Verifique no SECAF se há feriados locais na sua lotação.</span>
            </div>
        </div>

        <div class="input-group">
            <label>Sua Meta Padrão</label>
            <select id="metaPadrao">
                <option value="64">64 Horas (Padrão Geral)</option>
                <option value="32">32 Horas (Jornada de Trabalho Reduzida / Horário Especial)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Total de dias no mês</label>
            <select id="totalDiasMes">
                </select>
        </div>

        <div class="input-group">
            <label>Dias de Férias/Licença (Corridos)</label>
            <input type="number" id="diasFerias" value="0" min="0" placeholder="0">
        </div>

        <div class="input-group">
            <label>Feriados/Facultativos em DIAS ÚTEIS</label>
            <input type="number" id="feriadosUteis" value="0" min="0" placeholder="0">
        </div>

        <button class="btn-primary" onclick="calcular()">CALCULAR HORAS PRESENCIAIS</button>

        <div id="resultado">
            <div class="resumo-box">
                <span>Sua Meta Presencial:</span>
                <strong id="metaFinal">0h 00m</strong>
                <span style="font-size: 0.8rem; margin-top: 5px; opacity: 0.8;">Total de horas líquidas a cumprir presencialmente.</span>
            </div>
            
            <div class="action-buttons">
                <button id="btnCopiar" class="btn-secondary" onclick="copiarResumo()">Copiar Texto</button>
                <button class="btn-whatsapp" onclick="compartilharWhatsapp()">Enviar WhatsApp</button>
                <button class="btn-print" onclick="imprimirPagina()">Imprimir</button>
            </div>
        </div>

        <footer class="credits">Desenvolvido por <strong>Adriel</strong></footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
